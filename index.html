<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeShop</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- announcement bar -->

    <div class="announcement-bar">
      <div class="container">
        <p>
          WeShop Sale: <strong>20% Off</strong> — Auto Applied at Checkout —
          Limited Time Only
        </p>
      </div>
    </div>

    <!-- trust badge -->

    <div class="trust-badge">
      <div class="trust-badge-container">
        <img src="image/shipping.gif" alt="" class="trust-badge-icon" />
        <div class="trust-badge-text">
          <p class="trust-badge-title">Fastest Shipping</p>
          <p class="trust-badge-content">Order at $39 order</p>
        </div>
      </div>
      <div class="trust-badge-container">
        <img src="image/payment.gif" alt="" class="trust-badge-icon" />
        <div class="trust-badge-text">
          <p class="trust-badge-title">100% Safe Payments</p>
          <p class="trust-badge-content">9 month installments</p>
        </div>
      </div>
      <div class="trust-badge-container">
        <img src="image/return.gif" alt="" class="trust-badge-icon" />
        <div class="trust-badge-text">
          <p class="trust-badge-title">14-Days Return</p>
          <p class="trust-badge-content">Shop with confidence</p>
        </div>
      </div>
      <div class="trust-badge-container">
        <img src="image/message.gif" alt="" class="trust-badge-icon" />
        <div class="trust-badge-text">
          <p class="trust-badge-title">24/7 Online Support</p>
          <p class="trust-badge-content">Delivered to home</p>
        </div>
      </div>
    </div>
  </body>
</html>
